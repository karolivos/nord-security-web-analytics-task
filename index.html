  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <header>
    <h2>Nord Analytics Bonus Project</h2>
    <select id="localeSwitcher">
      <option value="en-US">English (US)</option>
      <option value="en-GB">English (UK)</option>
      <option value="de-DE">Deutsch</option>
      <option value="lt-LT">Lietuvių</option>
    </select>
    <button onclick="CookieConsent.showPreferences()" 
    style="margin-left:10px; padding:6px 12px; cursor:pointer;">
Cookie Settings
</button>
  </header>

  <main class="container">
    <section id="pricingPage">
      <h1>Choose your plan</h1>
      <p>5 pricing plans with multiple term options and locale testing.</p>
      <div id="pricingGrid" class="pricing-grid"></div>
    </section>

    <section id="checkoutPage" class="hidden">
      <div class="checkout-box">
        <h2>Checkout</h2>
        <p id="checkoutSummary"></p>
        <form id="checkoutForm">
          <input type="email" id="email" placeholder="Email" required />
          <input type="text" id="card" placeholder="Card Number" required />
          <button type="submit">Complete Checkout</button>
        </form>
      </div>
    </section>

    <section id="successPage" class="hidden">
      <div class="checkout-box success">
        <h2>✅ Payment Successful</h2>
        <p>Your subscription has been activated.</p>
        <button id="backButton">Back to Pricing</button>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
<footer>
    <button onclick="CookieConsent.showPreferences()">Cookie Settings</button>

</footer>
</html>
